name: Deploy Instructions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to all VMs
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Upload to Proxmox host staging area
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dovi-systemapps/ root@$HOST:/tmp/dovi-instructions-staging/

          # Deploy to each running VM
          ssh -i ~/.ssh/deploy_key root@$HOST '
            for vmid in $(qm list | tail -n +2 | awk "/running/{print \$1}"); do
              ipv6=$(printf "2a01:4f9:1a:a58f::%x" $vmid)
              echo "Deploying to VM $vmid..."
              for app_dir in /tmp/dovi-instructions-staging/*/; do
                app_name=$(basename "$app_dir")
                # Deploy webapp files (everything except instructions/)
                ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$ipv6 "mkdir -p ~/dovi-webapps/$app_name" 2>/dev/null
                rsync -a --exclude="instructions/" "$app_dir" root@[$ipv6]:~/dovi-webapps/$app_name/ 2>/dev/null
                # Deploy instructions if present
                if [ -d "${app_dir}instructions" ]; then
                  ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@$ipv6 "mkdir -p ~/dovi-instructions/$app_name" 2>/dev/null
                  rsync -a "${app_dir}instructions/" root@[$ipv6]:~/dovi-instructions/$app_name/ 2>/dev/null
                fi
              done && echo "  OK" || echo "  FAILED"
            done
            rm -rf /tmp/dovi-instructions-staging
          '
